name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        uses: aminya/setup-inno@v1

      - name: Build release packages
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Select-String -Path NAVMetadata.UI.csproj -Pattern '<Version>([^<]+)</Version>').Matches[0].Groups[1].Value
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/installer/NAVMetadata-Setup-${{ steps.version.outputs.value }}.exe
            artifacts/NAVMetadata-v${{ steps.version.outputs.value }}-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
